<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PackME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="langToggle" class="lang-toggle">EN</button>

  <main>
    <div class="brand">
      <div class="brand-mark">PM</div>
      <h1 data-i18n="title">PackME</h1>
    </div>
    <p class="subtitle" data-i18n="tagline">หา หรือสร้าง server pack ให้ modpack จาก CurseForge</p>

    <div class="search-wrap">
      <input
        id="modpackInput"
        data-i18n-placeholder="searchPlaceholder"
        placeholder="พิมพ์ชื่อ modpack เช่น RLCraft"
        autocomplete="off"
      />
      <div id="suggestions" class="suggestions hidden"></div>
    </div>

    <button id="checkBtn" disabled data-i18n="checkBtn">เช็ค</button>

    <div id="result" class="result hidden"></div>
  </main>

  <script src="i18n.js"></script>
  <script src="script.js"></script>
</body>
</html>
